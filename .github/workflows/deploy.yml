name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Export web build
        run: npx expo export --platform web
        env:
          NODE_ENV: production

      - name: Fix asset paths for GitHub Pages subpath
        run: |
          BASE="/english-revival"
          # Fix JS/CSS src paths in index.html
          sed -i "s|src=\"/_expo/|src=\"${BASE}/_expo/|g" dist/index.html
          sed -i "s|href=\"/_expo/|href=\"${BASE}/_expo/|g" dist/index.html
          sed -i "s|href=\"/favicon|href=\"${BASE}/favicon|g" dist/index.html
          echo "--- dist/index.html after fix ---"
          cat dist/index.html

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
